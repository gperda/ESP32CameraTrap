; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs = 
	secrets.ini

[env:freenove_esp32_s3_wroom]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
platform_packages =
  framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.3.8
board = freenove_esp32_s3_wroom
framework = arduino
build_flags =
	-D WEBSOCKETS_TCP_TIMEOUT=15000
lib_deps = 
	Links2004/WebSockets@^2.7.2
	sparkfun/SparkFun VL53L5CX Arduino Library@^1.0.3
	sd_read_write = symlink://../libs/sd_read_write
	camera_pins = symlink://../libs/camera_pins
	ota_update = symlink://../libs/ota_update
	ws2812 = symlink://../libs/ws2812
	freenove/Freenove WS2812 Lib for ESP32@^2.0.1
	bblanchon/ArduinoJson @ ^7.0.0
board_build.memory_type = qio_opi
board_build.psram_type = opi
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv
board_build.embed_txtfiles = ca.cert

monitor_speed = 115200
monitor_filters = time
monitor_port = /dev/esp32master
upload_port = /dev/esp32master
