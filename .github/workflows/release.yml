name: Build and Release Firmware

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.packages
            ~/.platformio/packages
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Prepare CA certificate files
        env:
          CA_CERT_PEM: ${{ secrets.CA_CERT_PEM }}
        run: |
          if [ -z "$CA_CERT_PEM" ]; then
            echo "Missing required secret: CA_CERT_PEM"
            exit 1
          fi

          printf '%s\n' "$CA_CERT_PEM" > master_camera/ca.cert
          printf '%s\n' "$CA_CERT_PEM" > slave_camera/ca.cert

      - name: Prepare PlatformIO secrets
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          MYSSID: ${{ secrets.MYSSID }}
          MYPASSWORD: ${{ secrets.MYPASSWORD }}
          REGISTER_TOKEN: ${{ secrets.REGISTER_TOKEN }}
          WS_URL: ${{ secrets.WS_URL }}
        run: |
          for value_name in CF_ACCESS_CLIENT_ID CF_ACCESS_CLIENT_SECRET MYSSID MYPASSWORD REGISTER_TOKEN WS_URL; do
            if [ -z "${!value_name}" ]; then
              echo "Missing required secret: $value_name"
              exit 1
            fi
          done

          cat > master_camera/secrets.ini <<EOF
          [env:freenove_esp32_s3_wroom]
          build_flags =
            -D CF_ACCESS_CLIENT_ID="${CF_ACCESS_CLIENT_ID}"
            -D CF_ACCESS_CLIENT_SECRET="${CF_ACCESS_CLIENT_SECRET}"
            -D MYSSID="${MYSSID}"
            -D MYPASSWORD="${MYPASSWORD}"
            -D REGISTER_TOKEN="${REGISTER_TOKEN}"
            -D WS_URL="${WS_URL}"
          EOF

          cat > slave_camera/secrets.ini <<EOF
          [env:freenove_esp32_s3_wroom]
          build_flags =
            -D CF_ACCESS_CLIENT_ID="${CF_ACCESS_CLIENT_ID}"
            -D CF_ACCESS_CLIENT_SECRET="${CF_ACCESS_CLIENT_SECRET}"
            -D MYSSID="${MYSSID}"
            -D MYPASSWORD="${MYPASSWORD}"
            -D REGISTER_TOKEN="${REGISTER_TOKEN}"
            -D WS_URL="${WS_URL}"
          EOF

      - name: Build master_camera
        run: |
          cd master_camera
          pio run -t clean
          pio run
          cp .pio/build/freenove_esp32_s3_wroom/firmware.bin ../master_camera.bin

      - name: Build slave_camera
        run: |
          cd slave_camera
          pio run -t clean
          pio run
          cp .pio/build/freenove_esp32_s3_wroom/firmware.bin ../slave_camera.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            master_camera.bin
            slave_camera.bin
            versions.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
